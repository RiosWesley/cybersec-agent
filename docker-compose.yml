version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybersentinel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
    restart: unless-stopped
    networks:
      - cybersentinel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cybersentinel-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cybersentinel-network

networks:
  cybersentinel-network:
    driver: bridge
